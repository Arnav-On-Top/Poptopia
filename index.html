<!DOCTYPE html>
<html>
    <head>
        <title> Poptopia</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <h1> Poptopia</h1>
        <p> Pop The Balloons</p>
        <div id="score"> Score: 0</div>
        <div id="high-score"> High Score</div>
        <div id="timer"> Time: 30</div>
        <button class="button" onclick="startGame()"> Start</button>
        <button class="button" onclick="pauseGame()"> Pause</button>
        <button class="button" onclick="resetGame()"> Reset</button>
        <div id="message"></div>
        <div id="game-area"></div>
        <script src="messages.js"></script>
        <script src="balloon.js"></script>
        <script src="timer.js"></script>
        <script src="script.js"></script>
    </body>
</html>
